<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="Css/Main.css">
  <link rel="icon" type="image/x-icon" href="/Images/crow-solid-full.svg">
</head>

<body>
  <main>
    <div id="navbar"></div>


    <div class="container-fluid">
      <div class="row">
        <div class="col-12 px-0">
      <p class="position-absolute top-50 start-50 translate-middle text-muted text-center fs-5 opacity-75 z-neg">
        Calendar may take a moment to load
      </p>          <!-- Show only on md and larger -->
          <div class="d-none d-md-block">
            <iframe
              src="https://calendar.zoho.com/zc/ui/embed/#calendar=zz08011230a86a2a81eb53cbf3512b64fc52a11ee1543b474f816702414ca791cbaf8bca03950ea4c84baff11357e69fb23a9e3175&title=Schedule&type=6&language=en&timezone=Europe%2FWarsaw&showTitle=0&showTimezone=1&startingDayOfWeek=1&timeFormat=1&color=9"
              title="Schedule" width="100%" height="700" frameborder="0" scrolling="no">
            </iframe>
          </div>

          <!-- Show only on small screens -->
          <div class="d-block d-md-none">
            <iframe
              src="https://calendar.zoho.com/zc/ui/embed/#calendar=zz08011230a86a2a81eb53cbf3512b64fc52a11ee1543b474f816702414ca791cbaf8bca03950ea4c84baff11357e69fb23a9e3175&title=Schedule&type=4&language=en&timezone=Europe%2FWarsaw&showTitle=0&showTimezone=1&startingDayOfWeek=1&timeFormat=1&color=9"
              title="Schedule" width="100%" height="700" frameborder="0" scrolling="no">
            </iframe>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="text-center my-3">
          <button type="button" class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#bookingModal">
            Book Appointment
          </button>
        </div>
        <!-- Modal -->
        <!-- Booking Modal -->
        <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

              <!-- Header -->
              <div class="modal-header">
                <h5 class="modal-title mx-auto h4 text-decoration-underline" id="bookingModalLabel">
                  Book an Appointment
                </h5>
              </div>

              <!-- Body -->
              <div class="modal-body d-flex flex-column align-items-center">
                <iframe
                  src="https://calendar.zoho.com/eventreqForm/zz08011230a86a2a81eb53cbf3512b64fc52a11ee1543b474f816702414ca791cbaf8bca03950ea4c84baff11357e69fb23a9e3175?theme=3&l=en&tz=Europe/Warsaw"
                  title="Schedule appointment for Shared Calendar" frameborder="0" scrolling="no"
                  allowtransparency="true" style="width:100%; height:400px; border:none; border-radius:0.5rem;">
                </iframe>
                <p>Warning, booking isn't entirely consistent</p>
              </div>

              <!-- Footer -->
              <div class="modal-footer bg-fancy border-top border-dark">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                  Close
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
<script>
  fetch('nav.html')
    .then(res => res.text())
    .then(html => document.getElementById('navbar').innerHTML = html)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</html>
