<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<body>
    <main>
        <div id="navbar"></div>


        <div class="container-fluid">
  <div class="row">
    <div class="col-12 px-0">
      <!-- Show only on md and larger -->
      <div class="d-none d-md-block">
        <iframe
          src="https://calendar.zoho.com/zc/ui/embed/#calendar=zz08011230a86a2a81eb53cbf3512b64fc52a11ee1543b474f816702414ca791cbaf8bca03950ea4c84baff11357e69fb23a9e3175&title=Schedule&type=6&language=en&timezone=Europe%2FWarsaw&showTitle=0&showTimezone=1&startingDayOfWeek=1&timeFormat=1&color=9"
          title="Schedule"
          width="100%"
          height="700"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>

      <!-- Show only on small screens -->
      <div class="d-block d-md-none">
        <iframe
          src="https://calendar.zoho.com/zc/ui/embed/#calendar=zz08011230a86a2a81eb53cbf3512b64fc52a11ee1543b474f816702414ca791cbaf8bca03950ea4c84baff11357e69fb23a9e3175&title=Schedule&type=4&language=en&timezone=Europe%2FWarsaw&showTitle=0&showTimezone=1&startingDayOfWeek=1&timeFormat=1&color=9"
          title="Schedule"
          width="100%"
          height="700"
          frameborder="0"
          scrolling="no">
        </iframe>
      </div>
    </div>
  </div>
</div>
    </main>
</body>
<script>
    fetch('nav.html')
        .then(res => res.text())
        .then(html => document.getElementById('navbar').innerHTML = html)
</script>
